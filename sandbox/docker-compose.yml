# Lokale EPICS-Service-Sandbox.
#
# Milestone 0: `test-ioc` = echtes e3-IOC (require essioc) FBIS-DLN01:Ctrl-EVR-01, lokal gebaut aus
# dem ESS-conda-Channel (sandbox/ioc-e3/Dockerfile). Liefert echte Live-PVs (CA+PVA, QSRV2) auf 127.0.0.1.
# Phase B (elasticsearch + channelfinder) wird nach dem M0-Checkpoint ergänzt.
#
# IOC-Image einmalig bauen (via Host-Proxy, nur Build-Zeit; Laufzeit 100% offline):
#   docker build --build-arg HTTPS_PROXY=http://host.docker.internal:8899 \
#     --build-arg HTTP_PROXY=http://host.docker.internal:8899 \
#     -t epics-sandbox-e3-ioc:7.0.9 -f sandbox/ioc-e3/Dockerfile sandbox/ioc-e3
# Start:  docker compose -f sandbox/docker-compose.yml up -d test-ioc
# Stop:   docker compose -f sandbox/docker-compose.yml down
# ⚠️ Container-Lifecycle (up/down) nur mit Dirks OK; vorher `docker ps` frisch (Multi-Window).

services:
  test-ioc:
    image: epics-sandbox-e3-ioc:7.0.9
    container_name: epics-sandbox-test-ioc
    # Phase B / M2: dem recceiver auf der gemeinsamen channelfinder-net-Bridge beitreten, damit der
    # reccaster dessen UDP-Announce empfängt. hostname: → reccaster meldet HOSTNAME=epics-sandbox-test-ioc
    # als CF-hostName (statt der Container-IP via cfstore-Fallback).
    # ⚠ Blast-Radius (QA): das erste `compose up` recreated NICHT nur test-ioc (Netz-Join), sondern auch
    # cf-channelfinder (neuer Healthcheck) + ggf. elasticsearch (SCHRITT-0-@sha256-Pin). ES/CF-Daten
    # überleben (cf-es-data-Volume, ~60 s CF-Neustart). Gegated: PVA-5075-Smoke davor/danach
    # (Port-Publishing 5075 überlebt den Netz-Wechsel).
    hostname: epics-sandbox-test-ioc
    networks: [channelfinder-net]
    # ENTRYPOINT (im Image) = conda run -n base iocsh st.cmd ; WORKDIR /iocs/test-evr.
    # Mount = Iteration an st.cmd/.db ohne Rebuild (rw: autosave/common_config kann später schreiben).
    volumes:
      - ./ioc-e3:/iocs/test-evr
    # iocsh liest stdin; ohne (pseudo-)TTY bekäme es EOF und der Container endete.
    stdin_open: true
    tty: true
    ports:
      # 0.0.0.0-Bind (NIE "127.0.0.1:") — sonst erreicht der native Windows-MCP den Port auf WSL2 nicht.
      - "5064:5064"       # CA server TCP + name-server-TCP
      - "5064:5064/udp"   # CA search UDP
      - "5065:5065/udp"   # CA beacon UDP
      - "5075:5075"       # PVA TCP + name-server-TCP (der funktionierende Pfad host->container)
    restart: "no"

  # --- Phase B / M1: ChannelFinder + Elasticsearch ---------------------------------------------
  # Shape = ESS ics-software/channelfinderservice/compose.yml (Tag ChannelFinder-5.1.0); Images anon
  # (elastic.co / GHCR), Laufzeit 127.0.0.1-lokal. demo_auth-/cf.ldif-Creds = Test-Creds, NIE Produktion.
  # test-ioc bleibt UNANGETASTET (eigenes Netz channelfinder-net; der recsync-Join folgt erst in M2).
  elasticsearch:
    # Digest-gepinnt (reproduzierbarer Pull): Tag + @sha256 des verifiziert laufenden Images
    # (docker inspect --format '{{index .RepoDigests 0}}' …:8.18.0). Tag bleibt zur Lesbarkeit.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0@sha256:70b37a809f04cd86e14460f959ff33c272a38f24268eee8b913c2cc73ac86c88
    container_name: cf-elasticsearch
    networks: [channelfinder-net]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      cluster.name: channelfinder
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      # bootstrap.memory_lock bewusst NICHT gesetzt (bräuchte ulimits memlock=-1); vm.max_map_count ist ok.
    mem_limit: 2g
    volumes:
      - cf-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    ports:
      - "9200:9200"       # nur Debug
    restart: "no"

  channelfinder:
    # Digest-gepinnt (reproduzierbarer Pull): Tag + @sha256 des verifiziert laufenden Images.
    image: ghcr.io/channelfinder/channelfinderservice:ChannelFinder-5.1.0@sha256:b9fc4276c89ea723030b80c8d475f0078731595df9a952adfc1773eea0ccd822
    container_name: cf-channelfinder
    networks: [channelfinder-net]
    environment:
      # CF↔ES container-to-container: host_urls genügt. network.host ist deprecated und wird von CF 5.1.0
      # ignoriert (Log: "Only one of elasticsearch.host_urls and network.host can be set, ignoring
      # elasticsearch.network.host") — darum hier NICHT gesetzt. Bei Connect-Fehler `logs channelfinder`.
      ELASTICSEARCH_HOST_URLS: http://elasticsearch:9200
      # KEIN context-path-Env: CF 5.1.0 mappt seine Controller bereits NATIV unter /ChannelFinder/resources/...
      # (empirisch verifiziert — ein zusätzliches SERVER_SERVLET_CONTEXT_PATH verdoppelt zu /ChannelFinder/ChannelFinder).
      # → Endpunkte liegen out-of-the-box auf /ChannelFinder/resources/channels = matcht Seed/Test/.mcp.json-Defaults.
    mem_limit: 1g
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      # CF-Image (Ubuntu 26.04) hat WEDER curl NOCH wget NOCH python — nur bash. Darum Port-Readiness
      # via bash /dev/tcp: Spring Boot bindet 8080 erst am Ende des Startups → Port-offen ≈ App-bereit.
      # (Ein tieferer HTTP-200-Check entfällt mangels HTTP-Client; der recceiver toleriert ein noch
      # nicht ES-verbundenes CF ohnehin via twisted-Retry im cfstore.)
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8080:8080"
    restart: "no"

  # --- Phase B / M2: recceiver (essioc → reccaster → recceiver → ChannelFinder Auto-Populate) ------
  # Vanilla recsync 1.8 (sandbox/recceiver/Dockerfile, OHNE ESS-Patches). Empfängt die reccaster-
  # Records des test-ioc über die gemeinsame channelfinder-net-Bridge und schreibt sie via
  # channelfinderapi.conf nach CF. Kein veröffentlichter Port nötig (Announce-Broadcast + der
  # TCP-connect-back des reccasters sind container-intern auf der Bridge).
  recceiver:
    build:
      context: ./recceiver
      # Proxy aus dem Host-Env durchreichen (leer = kein Proxy), damit `compose build recceiver` bei
      # geblocktem Egress den Host-CONNECT-Proxy nutzt — ohne manuelles `docker build --build-arg`.
      args:
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
    container_name: recsync-recceiver
    networks: [channelfinder-net]
    depends_on:
      channelfinder:
        condition: service_healthy
    mem_limit: 256m
    restart: "no"

  # --- Phase C / C-1: EPICS Archiver Appliance (Redis-Persistence, Single-JVM) -------------------
  # Aktiviert is_archived/get_pv_history (Client-Code + @mcp.tool existieren bereits), sobald
  # EPICS_MCP_ARCHIVER_URL=http://localhost:17665 gesetzt ist (.mcp.json → neues Fenster). Shape
  # gespiegelt von der pklaus-Referenz (github.com/pklaus/archiver-appliance-with-example-ioc/
  # docker-compose.yml), aber gegen UNSER test-ioc (kein gebündeltes Example-IOC).
  # ⚠ Image pklaus/archiver-appliance ist ein 2020er Community-Build (einziger Tag `latest`) →
  # nach Live-Verify per @sha256 digest-pinnen (PIN-AFTER-VERIFY, Ritual wie elasticsearch :48-50).
  archiver-redis:
    # Digest-gepinnt (reproduzierbarer Pull); Tag bleibt zur Lesbarkeit.
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: epics-sandbox-archiver-redis
    networks: [channelfinder-net]
    command: ["redis-server", "--appendonly", "yes"]
    mem_limit: 256m
    volumes:
      - archiver-db:/data
    restart: "no"

  archiver:
    # Digest-gepinnt nach Live-Verify (29.06.2026: alle 5 EVR-PVs „Being archived", getData.json
    # 12VValue=12.0, Engine-Connect zum test-ioc per CA über die Bridge). Image-Version 0.0.1-2019.
    image: pklaus/archiver-appliance@sha256:bf079289001366cc8aade0dd4d6e14757a60dad71de056f6ab983abadf9c424e
    container_name: epics-sandbox-archiver
    hostname: archappl
    networks: [channelfinder-net]
    depends_on:
      - archiver-redis
    environment:
      # mgmt+engine+etl+retrieval in EINEM Tomcat → alles unter :17665 (matcht archiver_client.py).
      ARCHAPPL_ALL_APPS_ON_ONE_JVM: "true"
      # Redis statt MariaDB (kein DB-Schema/Connector nötig). REDISURL = der Bridge-Service-Name.
      ARCHAPPL_PERSISTENCE_LAYER: "org.epics.archiverappliance.config.persistence.RedisPersistence"
      ARCHAPPL_PERSISTENCE_LAYER_REDISURL: "archiver-redis"
      # PV-Auflösung zum test-ioc per CA über die Bridge (Container→Container). Die Archiver-Engine
      # ist CA-nativ (2020er Build, vor brauchbarem PVA-Archiving); das test-ioc serviert CA auf 5064.
      # ⚠ Der WSL2-NAT-Befund (README.md "Netzwerk-Befund") betrifft NUR Host-Windows→Container —
      # Container→Container-CA auf der Bridge ist davon unberührt. Beim Bau verifizieren, dass die
      # Engine die PV erreicht (getPVStatus → "Being archived"); falls nicht, ist das der Debug-Punkt.
      EPICS_CA_ADDR_LIST: "epics-sandbox-test-ioc"
      EPICS_CA_AUTO_ADDR_LIST: "no"
      EPICS_CA_SERVER_PORT: "5064"
    mem_limit: 2g
    # Die Appliance liest stdin (start.sh) — ohne (pseudo-)TTY EOF-Exit (wie test-ioc).
    stdin_open: true
    tty: true
    healthcheck:
      # Port-Readiness via bash /dev/tcp (kein curl-Bedarf, wie CF). Die 4 Webapps brauchen Anlauf
      # → großzügiges start_period. Nichts hängt an dieser Health-Condition (rein informativ).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/17665"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    volumes:
      - archiver-sts:/storage/sts     # short-term (hourly)
      - archiver-mts:/storage/mts     # medium-term (daily)
      - archiver-lts:/storage/lts     # long-term (yearly)
      - archiver-logs:/storage/logs
    ports:
      - "17665:17665"
    restart: "no"

volumes:
  cf-es-data:
    driver: local
  archiver-db:
    driver: local
  archiver-sts:
    driver: local
  archiver-mts:
    driver: local
  archiver-lts:
    driver: local
  archiver-logs:
    driver: local

networks:
  channelfinder-net:
    driver: bridge
