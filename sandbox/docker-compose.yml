# Lokale EPICS-Service-Sandbox.
#
# Milestone 0: `test-ioc` = echtes e3-IOC (require essioc) FBIS-DLN01:Ctrl-EVR-01, lokal gebaut aus
# dem ESS-conda-Channel (sandbox/ioc-e3/Dockerfile). Liefert echte Live-PVs (CA+PVA, QSRV2) auf 127.0.0.1.
# Phase B (elasticsearch + channelfinder) wird nach dem M0-Checkpoint ergänzt.
#
# IOC-Image einmalig bauen (via Host-Proxy, nur Build-Zeit; Laufzeit 100% offline):
#   docker build --build-arg HTTPS_PROXY=http://host.docker.internal:8899 \
#     --build-arg HTTP_PROXY=http://host.docker.internal:8899 \
#     -t epics-sandbox-e3-ioc:7.0.9 -f sandbox/ioc-e3/Dockerfile sandbox/ioc-e3
# Start:  docker compose -f sandbox/docker-compose.yml up -d test-ioc
# Stop:   docker compose -f sandbox/docker-compose.yml down
# ⚠️ Container-Lifecycle (up/down) nur mit Dirks OK; vorher `docker ps` frisch (Multi-Window).

services:
  test-ioc:
    image: epics-sandbox-e3-ioc:7.0.9
    container_name: epics-sandbox-test-ioc
    # Phase B / M2: dem recceiver auf der gemeinsamen channelfinder-net-Bridge beitreten, damit der
    # reccaster dessen UDP-Announce empfängt. hostname: → reccaster meldet HOSTNAME=epics-sandbox-test-ioc
    # als CF-hostName (statt der Container-IP via cfstore-Fallback).
    # ⚠ Blast-Radius (QA): das erste `compose up` recreated NICHT nur test-ioc (Netz-Join), sondern auch
    # cf-channelfinder (neuer Healthcheck) + ggf. elasticsearch (SCHRITT-0-@sha256-Pin). ES/CF-Daten
    # überleben (cf-es-data-Volume, ~60 s CF-Neustart). Gegated: PVA-5075-Smoke davor/danach
    # (Port-Publishing 5075 überlebt den Netz-Wechsel).
    hostname: epics-sandbox-test-ioc
    networks: [channelfinder-net]
    # ENTRYPOINT (im Image) = conda run -n base iocsh st.cmd ; WORKDIR /iocs/test-evr.
    # Mount = Iteration an st.cmd/.db ohne Rebuild (rw: autosave/common_config kann später schreiben).
    volumes:
      - ./ioc-e3:/iocs/test-evr
    # iocsh liest stdin; ohne (pseudo-)TTY bekäme es EOF und der Container endete.
    stdin_open: true
    tty: true
    ports:
      # 0.0.0.0-Bind (NIE "127.0.0.1:") — sonst erreicht der native Windows-MCP den Port auf WSL2 nicht.
      - "5064:5064"       # CA server TCP + name-server-TCP
      - "5064:5064/udp"   # CA search UDP
      - "5065:5065/udp"   # CA beacon UDP
      - "5075:5075"       # PVA TCP + name-server-TCP (der funktionierende Pfad host->container)
    restart: "no"

  # --- Phase B / M1: ChannelFinder + Elasticsearch ---------------------------------------------
  # Shape = Upstream-CF-Dev-Compose: ics-software/channelfinderservice/compose.yml @ ChannelFinder-5.1.0 ist die
  # Upstream-Dev-Convenience-Compose, nur nach ESS-GitLab gespiegelt — KEIN ESS-Deploy-Artefakt. ESS-Prod läuft
  # CF 4.7.3-alpha auf ES 8.11.3 als ESS-Wrapper-Image (ics-ans-role-channelfinder); die Sandbox nutzt bewusst
  # Upstream-5.1.0 (API-kompatibel für die read-only MCP-Lookups) — Angleichung läuft (decision GR / Option C).
  # Images anon (elastic.co / GHCR), Laufzeit 127.0.0.1-lokal. demo_auth-/cf.ldif-Creds = Test-Creds, NIE Produktion.
  # test-ioc bleibt UNANGETASTET (eigenes Netz channelfinder-net; der recsync-Join folgt erst in M2).
  elasticsearch:
    # ESS-Prod-Pin: ES 8.11.3 (ics-ans-role-channelfinder pinnt 8.11.3 für die CF-Rolle; decision GR / Option C, P1).
    # Digest-gepinnt nach Live-Verify (PIN-AFTER-VERIFY 2026-06-29): ES bootete green auf leerem Volume (Wipe nötig,
    # da 8.18-Volume forward-inkompatibel), CF-5.1.0 connectet sauber (Created index channelfinder/cf_tags/cf_properties),
    # Re-Seed via recsync auf 576, coverage_audit cf_and_display 572 == Baseline.
    # (Vorher 8.18.0@sha256:70b37a809f04cd86e14460f959ff33c272a38f24268eee8b913c2cc73ac86c88 — Rollback-Referenz.)
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3@sha256:2892d2363c3c12c5ed54c64faf89e3a19d633d8dd0d190d0bffe03035ff099b3
    container_name: cf-elasticsearch
    networks: [channelfinder-net]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      cluster.name: channelfinder
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      # bootstrap.memory_lock bewusst NICHT gesetzt (bräuchte ulimits memlock=-1); vm.max_map_count ist ok.
    mem_limit: 2g
    volumes:
      - cf-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    ports:
      - "9200:9200"       # nur Debug
    restart: "no"

  channelfinder:
    # SELF-BUILD CF 4.7.3-alpha (ESS-Prod-Pin ics-ans-role-channelfinder; kein GHCR-Tag) — spiegelt
    # ics-docker/channelfinder (GitLab id 7114), ohne ESS-CA. decision GR / Option C, P2.
    # Rollback-Referenz: image ghcr.io/channelfinder/channelfinderservice:ChannelFinder-5.1.0@sha256:b9fc4276c89ea723030b80c8d475f0078731595df9a952adfc1773eea0ccd822
    build:
      context: ./channelfinder
      args:
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
    container_name: cf-channelfinder
    networks: [channelfinder-net]
    environment:
      # CF↔ES container-to-container: host_urls genügt. network.host ist deprecated und wird von CF 5.1.0
      # ignoriert (Log: "Only one of elasticsearch.host_urls and network.host can be set, ignoring
      # elasticsearch.network.host") — darum hier NICHT gesetzt. Bei Connect-Fehler `logs channelfinder`.
      ELASTICSEARCH_HOST_URLS: http://elasticsearch:9200
      # KEIN context-path-Env: CF (4.7.3-alpha wie 5.1.0) mappt NATIV unter /ChannelFinder/resources/... (code-level
      # CHANNEL_RESOURCE_URI = "ChannelFinder/resources/…")
      # (empirisch verifiziert — ein zusätzliches SERVER_SERVLET_CONTEXT_PATH verdoppelt zu /ChannelFinder/ChannelFinder).
      # → Endpunkte liegen out-of-the-box auf /ChannelFinder/resources/channels = matcht Seed/Test/.mcp.json-Defaults.
    mem_limit: 1g
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      # CF-Image (Ubuntu 26.04) hat WEDER curl NOCH wget NOCH python — nur bash. Darum Port-Readiness
      # via bash /dev/tcp: Spring Boot bindet 8080 erst am Ende des Startups → Port-offen ≈ App-bereit.
      # (Ein tieferer HTTP-200-Check entfällt mangels HTTP-Client; der recceiver toleriert ein noch
      # nicht ES-verbundenes CF ohnehin via twisted-Retry im cfstore.)
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8080:8080"
    restart: "no"

  # --- Phase B / M2: recceiver (essioc → reccaster → recceiver → ChannelFinder Auto-Populate) ------
  # ESS-Prod-Bau (decision GR / Option C, P3 / Scope VOLL): recsync 1.8 + die 4 ESS-Patches + gepinnte
  # requirements + multi-stage venv (sandbox/recceiver/Dockerfile, wortgetreu ics-docker/recceiver id 7168).
  # Empfängt die reccaster-Records des test-ioc über die gemeinsame channelfinder-net-Bridge und schreibt
  # sie via docker.conf-ENV nach CF. Kein veröffentlichter Port nötig (Announce-Broadcast + der
  # TCP-connect-back des reccasters sind container-intern auf der Bridge).
  recceiver:
    build:
      context: ./recceiver
      # Proxy aus dem Host-Env durchreichen (leer = kein Proxy), damit `compose build recceiver` bei
      # geblocktem Egress den Host-CONNECT-Proxy nutzt — ohne manuelles `docker build --build-arg`.
      args:
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
    container_name: recsync-recceiver
    networks: [channelfinder-net]
    depends_on:
      channelfinder:
        condition: service_healthy
    # P3 / Scope VOLL (decision GR): CF-Verbindung kommt aus der docker.conf-ENV (NICHT mehr aus
    # channelfinderapi.conf). Das Dockerfile-ENV liefert die ESS-Defaults aller %(VAR)s; hier nur die
    # Overrides für unsere Sandbox-CF. recceiverId steht stabil literal in der docker.conf (B3 / QA-C5).
    environment:
      CHANNELFINDER_URL: "http://channelfinder:8080/ChannelFinder"   # B3: Vollform (Port + /ChannelFinder); ESS-Default http://channelfinder bräche gegen unser :8080
      CHANNELFINDER_USERNAME: "admin"                                 # = CF demo_auth-User + Channel-Owner (konsistent mit M1-Seed)
      CHANNELFINDER_PASSWORD: "adminPass"                             # Sandbox-Test-Cred, NIE Produktion
      RECCEIVER_LOGLEVEL: "INFO"                                      # Sandbox-Verify: CF_START/CF_INIT sind INFO (ESS-Default WARN würde sie verstecken)
    mem_limit: 256m
    restart: "no"

  # --- Phase C / C-1: EPICS Archiver Appliance (Redis-Persistence, Single-JVM) -------------------
  # Aktiviert is_archived/get_pv_history (Client-Code + @mcp.tool existieren bereits), sobald
  # EPICS_MCP_ARCHIVER_URL=http://localhost:17665 gesetzt ist (.mcp.json → neues Fenster). Shape
  # gespiegelt von der pklaus-Referenz (github.com/pklaus/archiver-appliance-with-example-ioc/
  # docker-compose.yml), aber gegen UNSER test-ioc (kein gebündeltes Example-IOC).
  # ⚠ Image pklaus/archiver-appliance ist ein 2020er Community-Build (einziger Tag `latest`) →
  # nach Live-Verify per @sha256 digest-pinnen (PIN-AFTER-VERIFY, Ritual wie elasticsearch :48-50).
  # ESS-Prod-Stand: Archiver Appliance 2.1.1 (epics-archiver-release-remote) + MariaDB + 4-Instanz-Tomcat
  # (ics-ans-role-epicsarchiverap) — bewusste Sandbox-Abweichung; Angleichung läuft (decision GR / Option C, P5).
  archiver-redis:
    # Digest-gepinnt (reproduzierbarer Pull); Tag bleibt zur Lesbarkeit.
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: epics-sandbox-archiver-redis
    networks: [channelfinder-net]
    command: ["redis-server", "--appendonly", "yes"]
    mem_limit: 256m
    volumes:
      - archiver-db:/data
    restart: "no"

  archiver:
    # Digest-gepinnt nach Live-Verify (29.06.2026: alle 5 EVR-PVs „Being archived", getData.json
    # 12VValue=12.0, Engine-Connect zum test-ioc per CA über die Bridge). Image-Version 0.0.1-2019.
    image: pklaus/archiver-appliance@sha256:bf079289001366cc8aade0dd4d6e14757a60dad71de056f6ab983abadf9c424e
    container_name: epics-sandbox-archiver
    hostname: archappl
    networks: [channelfinder-net]
    depends_on:
      - archiver-redis
    environment:
      # mgmt+engine+etl+retrieval in EINEM Tomcat → alles unter :17665 (matcht archiver_client.py).
      ARCHAPPL_ALL_APPS_ON_ONE_JVM: "true"
      # Redis statt MariaDB (kein DB-Schema/Connector nötig). REDISURL = der Bridge-Service-Name.
      ARCHAPPL_PERSISTENCE_LAYER: "org.epics.archiverappliance.config.persistence.RedisPersistence"
      ARCHAPPL_PERSISTENCE_LAYER_REDISURL: "archiver-redis"
      # PV-Auflösung zum test-ioc per CA über die Bridge (Container→Container). Die Archiver-Engine
      # ist CA-nativ (2020er Build, vor brauchbarem PVA-Archiving); das test-ioc serviert CA auf 5064.
      # ⚠ Der WSL2-NAT-Befund (README.md "Netzwerk-Befund") betrifft NUR Host-Windows→Container —
      # Container→Container-CA auf der Bridge ist davon unberührt. Beim Bau verifizieren, dass die
      # Engine die PV erreicht (getPVStatus → "Being archived"); falls nicht, ist das der Debug-Punkt.
      EPICS_CA_ADDR_LIST: "epics-sandbox-test-ioc"
      EPICS_CA_AUTO_ADDR_LIST: "no"
      EPICS_CA_SERVER_PORT: "5064"
    mem_limit: 2g
    # Die Appliance liest stdin (start.sh) — ohne (pseudo-)TTY EOF-Exit (wie test-ioc).
    stdin_open: true
    tty: true
    healthcheck:
      # Port-Readiness via bash /dev/tcp (kein curl-Bedarf, wie CF). Die 4 Webapps brauchen Anlauf
      # → großzügiges start_period. Nichts hängt an dieser Health-Condition (rein informativ).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/17665"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    volumes:
      - archiver-sts:/storage/sts     # short-term (hourly)
      - archiver-mts:/storage/mts     # medium-term (daily)
      - archiver-lts:/storage/lts     # long-term (yearly)
      - archiver-logs:/storage/logs
    ports:
      - "17665:17665"
    restart: "no"

  # --- Phase C / C-2: Phoebus-Alarm-Stack (Kafka KRaft + ES + alarm-server + alarm-logger) -------
  # Aktiviert is_alarm_configured (Coverage-Signal) über die Alarm-Logger-REST.
  # ESS-PROD-STAND (decision GR / Option C, P4 ERLEDIGT): alarm-server/-logger sind SELF-BUILT auf den
  # ESS-Prod-Deploy-Release 5.0.052 (Artefakte service-alarm-{server,logger}-5.0.052 in libs-release-local/
  # org/phoebus/ — am HOST gezogen via fetch_alarm_artifacts.sh + COPY; Build-Kontexte ./alarm-server,
  # ./alarm-logger). ESS stellt kein Docker-Image für den Alarm-Stack bereit (Deploy = Ansible/systemd);
  # 5.0.052 = der Prod-Deploy-Pin (ics-ans-alarm-server host_vars/group_vars @ master), NICHT der neueste
  # Release (Artifactory führt bis 6.0.001).
  # alarm-elasticsearch: ESS-Pin = 8.2.3, aber auf diesem cgroup-v2-Host nicht lauffähig (bundled-JDK-NPE in
  # 8.2.3 + 8.4.3) → 8.5.3 = erste host-lauffähige ES-Linie, am nächsten an 8.2.x (s. Service-Block). Funktional
  # neutral: 5.0.052 nutzt den neuen co.elastic.clients-ES-8-Client (elasticsearch-java:8.2.0), wire-kompatibel
  # über die GANZE ES-8.x-Linie; der ES-8-Client-BLOCKER (RestHighLevelClient/CSS #2273) ist quellcode-tot
  # (8-Agenten-QA + Live-Recheck Tag ESS-5.0.052, commit 718af74a: RestHighLevelClient = 0 Treffer in Quelle+POM).
  # BEWUSSTE Abweichungen (ehrlich): alarm-kafka bleibt apache/kafka:3.8.0 (KRaft, kein Zookeeper) — eine
  # bewusste, REST-gleichwertige Sandbox-Vereinfachung (ESS-Prod = ics-ans-role-kafka, Confluent + ZooKeeper),
  # NICHT "kein 3.6.2-Image". alarm-server -server via CLI statt settings.ini = bewusste, parser-äquivalente
  # Vereinfachung.
  # ⚠ Ports REMAPPT (CF besitzt 8080/9200): Logger-REST -> 8081, Alarm-ES -> 9201.
  # ⚠ Config-Import-Reihenfolge ZWINGEND: alarm-kafka + alarm-logger up (Logger subscribed) -> DANN
  # alarm-server -import (sonst landet die Config in Kafka, aber nie im ES-Index -> REST liefert leer).
  # PIN-AFTER-VERIFY: apache/kafka:3.8.0 + alarm-elasticsearch:8.2.3 @sha256 gepinnt; self-built (server/
  # logger) -> kein Registry-Digest → Pins = Base-Digest (FROM ...@sha256) + Artefakt-sha256 (sha256sum -c).
  alarm-kafka:
    # Digest-gepinnt nach Live-Verify (29.06.2026: KRaft-Broker healthy, Config-Import + REST-Index ok).
    image: apache/kafka:3.8.0@sha256:c89f315cff967322c5d2021434b32271393cb193aa7ec1d43e97341924e57069
    container_name: epics-sandbox-alarm-kafka
    hostname: alarm-kafka
    networks: [channelfinder-net]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@alarm-kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      # ⚠ #1-Alarm-Fehler: advertised MUSS der Bridge-Hostname sein (nicht localhost), sonst
      # verbinden sich alarm-server/-logger nach dem Bootstrap nicht zum Broker zurueck.
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://alarm-kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    mem_limit: 1g
    volumes:
      - alarm-kafka-data:/var/lib/kafka/data
    healthcheck:
      # Broker-Readiness (KRaft formatiert die Storage automatisch beim ersten Start).
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    restart: "no"

  alarm-elasticsearch:
    # ESS-Alarm-ES-Pin = 8.2.3; auf diesem cgroup-v2-Dev-Host (Docker Desktop/WSL2) NICHT lauffähig: das in
    # ES 8.2.3 UND 8.4.3 gebündelte JDK 18.0.x crasht beim cgroup-v2-Memory-Read (CgroupInfo.getMountPoint()
    # NPE, JDK-8281571; 3 Fix-Versuche erfolglos: cgroupns=host / -XX:-UseContainerSupport / ohne mem_limit).
    # → 8.5.3: erste ES-Linie mit cgroup-v2-fähigem JDK (19) → die 8.2.x-NÄCHSTE Version, die hier bootet
    #   (live verifiziert: cluster green, 0 NPE).
    # FIDELITY-CAVEAT (bewusste, host-bedingte Abweichung, decision GR / Option C): funktional neutral — der
    # 5.0.052-Logger nutzt elasticsearch-java:8.2.0, wire-kompatibel über die GANZE ES-8.x-Linie.
    # EIGENER Cluster (Entkopplung vom CF-ES 8.11.3) + Host-Port 9201. @sha256 am Verify-Zeitpunkt erfasst.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.3@sha256:c9b454f73b1e2365d43f1f46f1b9464b981e5f98c1dd46fee01dbd5a4a446973
    container_name: epics-sandbox-alarm-es
    networks: [channelfinder-net]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      cluster.name: alarm
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    mem_limit: 1g
    volumes:
      - alarm-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    ports:
      - "9201:9200"       # nur Debug (CF-ES besitzt 9200)
    restart: "no"

  alarm-logger:
    # SELF-BUILT ESS-Prod-Release 5.0.052 (P4; Spring-Boot Fat-Jar). Build-Kontext ./alarm-logger (Artefakt
    # am Host gezogen + COPY). Vorher ghcr :master (6.0.0-SNAPSHOT). PIN: Base-Digest + Artefakt-sha256 im Dockerfile.
    build: ./alarm-logger
    container_name: epics-sandbox-alarm-logger
    networks: [channelfinder-net]
    depends_on:
      alarm-kafka:
        condition: service_started     # Logger retried Kafka selbst; nicht an die Health gaten
      alarm-elasticsearch:
        condition: service_healthy
    # ESS-treue 5.0.052-Flags (single-dash). -thread_pool_size ist in 5.0.052 gültig (in master ENTFERNT →
    # Bau gegen master würde scheitern); -es_port 9200 = container-intern (Host 9201). Shell-Wrapper
    # /bin/bash -c BLEIBT (H1): die -D-Props mit Spaces (purge_cron_expr) + die Mehrzeilen-Form brauchen eine
    # Shell — bare-Exec verlöre Quoting/-D. Bare Jar via WORKDIR /opt (Dockerfile). -D-Wert in '...' (genestet im "...").
    command: >
      /bin/bash -c "
      java -Dretain_indices_count=6 -Dretention_period_days=100 -Dpurge_cron_expr='0 0 0 * * SUN'
      -jar service-alarm-logger-5.0.052.jar -noshell -topics Accelerator
      -es_host alarm-elasticsearch -es_port 9200 -es_sniff false
      -bootstrap.servers alarm-kafka:9092 -date_span_units M -date_span_value 1 -thread_pool_size 4"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    ports:
      - "8081:8080"       # Logger-REST (CF besitzt 8080)
    restart: "no"

  alarm-server:
    # SELF-BUILT ESS-Prod-Release 5.0.052 (P4; Thin-Jar + lib/, WORKDIR = Entpack-Verzeichnis). Build-Kontext
    # ./alarm-server. Vorher ghcr :master. PIN: Base-Digest + Artefakt-sha256 im Dockerfile.
    build: ./alarm-server
    container_name: epics-sandbox-alarm-server
    networks: [channelfinder-net]
    depends_on:
      alarm-kafka:
        condition: service_started
    # Liest die Config aus Kafka + watcht die IOC-PVs via PVA (fuer State; NICHT noetig fuers
    # Coverage-Signal is_alarm_configured, das aus dem Logger-ES-Config-Index kommt). PVA ueber den
    # Nameserver des test-ioc auf der Bridge (best-effort; State ist Wedge-4-Concern).
    environment:
      EPICS_PVA_NAME_SERVERS: "epics-sandbox-test-ioc:5075"
      EPICS_PVA_AUTO_ADDR_LIST: "NO"
    # Bare Jar via WORKDIR /opt/service-alarm-server-5.0.052 (Thin-Jar neben lib/, rel. Class-Path). -server via
    # CLI statt settings.ini = bewusste, parser-äquivalente Vereinfachung. Config-Import = separater `compose run` (README).
    command: >
      /bin/bash -c "
      java -jar service-alarm-server-5.0.052.jar
      -config Accelerator -server alarm-kafka:9092 -noshell"
    mem_limit: 512m
    volumes:
      - ./alarm:/config:ro
    restart: "no"

volumes:
  cf-es-data:
    driver: local
  archiver-db:
    driver: local
  archiver-sts:
    driver: local
  archiver-mts:
    driver: local
  archiver-lts:
    driver: local
  archiver-logs:
    driver: local
  alarm-kafka-data:
    driver: local
  alarm-es-data:
    driver: local

networks:
  channelfinder-net:
    driver: bridge
