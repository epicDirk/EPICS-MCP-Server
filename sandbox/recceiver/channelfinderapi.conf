# pyCFClient-Konfiguration (channelfinder._conf liest die [DEFAULT]-Sektion aus
# /etc/channelfinderapi.conf, ~/.channelfinderapi.conf ODER ./channelfinderapi.conf im cwd).
# DIESE Datei = die CF-Verbindung des recceivers: cfstore ruft ChannelFinderClient() OHNE Args auf,
# der Client zieht BaseURL/username/password ausschliesslich von hier.
# Lesen braucht keine Auth; Schreiben = demo_auth admin/adminPass (Sandbox-Test-Creds, NIE Produktion).
[DEFAULT]
BaseURL = http://channelfinder:8080/ChannelFinder
username = admin
password = adminPass
