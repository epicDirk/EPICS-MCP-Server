# recceiver-Konfiguration (twistd --config docker.conf) — WORTGETREUE ESS-Form (ics-docker/recceiver
# id 7168, branch main): alle Werte via %(VAR)s-ENV-Interpolation (aktiviert durch expandvars.patch;
# ConfigParser löst %(VAR)s case-insensitiv gegen os.environ auf). Die CF-Verbindung kommt seit P3/VOLL
# aus DIESER Datei ([cf] baseURL/username/password), NICHT mehr aus channelfinderapi.conf (entfernt).
# Die %(VAR)s-Defaults setzt das Dockerfile-ENV; compose überschreibt CHANNELFINDER_URL/USERNAME/PASSWORD
# + RECCEIVER_LOGLEVEL.
[recceiver]
# Logging detail level. Use python logging level name.
loglevel = %(RECCEIVER_LOGLEVEL)s

# list of broadcast addresses.
addrlist = %(RECCEIVER_ADDRLIST)s

# Processing chain
procs = %(RECCEIVER_PROCS)s

# Time interval for sending recceiver advertisments
announceInterval = %(RECCEIVER_ANNOUNCE_INTERVAL)s

# Idle Timeout for TCP connections.
tcptimeout = %(RECCEIVER_TCP_TIMEOUT)s

# Time to wait before commiting updates. Doesn't effect IOC clients.
commitInterval = %(RECCEIVER_COMMIT_INTERVAL)s

# Maximum concurrent "active" clients to allow.
maxActive = %(RECCEIVER_MAX_ACTIVE)s

[cf]
# Base URL for ChannelFinder services
baseURL = %(CHANNELFINDER_URL)s
# Username for ChannelFinder services (= Channel-Owner-Feld)
username = %(CHANNELFINDER_USERNAME)s
# Password for ChannelFinder services
password = %(CHANNELFINDER_PASSWORD)s
# a space-separated list of infotags to set as CF Properties
infotags = %(CHANNELFINDER_INFOTAGS)s
# Turn on optional alias and recordType properties
alias = on
recordType = on
recordDesc = on
# IOCVERSION property (entsteht nur, wenn der IOC IOCVERSION announced — in unserer Sandbox aktuell nicht)
environment_vars=IOCVERSION:iocVersion
# Bewusste Abweichung vom ESS-Verbatim (B3 / QA-C5): recceiverId LITERAL stabil halten. Die ESS-docker.conf
# setzt KEIN recceiverId → Fallback = socket.gethostname(); unsere Docker-Container haben aber keinen stabilen
# Hostname wie ESS-Prod-VMs (driftet je Recreate). Die heutigen 576 Kanäle tragen recceiverID=recsync-sandbox;
# ein Drift würde cleanOnStart die alten NICHT matchen → verwaiste Active-Doubletten, stiller Baseline-Bruch.
recceiverId = recsync-sandbox
# Set all the pvs belonging to the recceiver to Inactive on start (matched über recceiverId).
cleanOnStart = True
