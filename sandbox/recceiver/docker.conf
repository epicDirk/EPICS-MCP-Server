# recceiver-Konfiguration (twistd --config docker.conf). Literal, keine %(VAR)s-Interpolation
# → kein ESS-expandvars-Patch nötig. Verarbeitungskette = nur der cf-Processor (schreibt nach
# ChannelFinder; die CF-Verbindung selbst kommt aus channelfinderapi.conf, NICHT von hier).
[recceiver]
loglevel = INFO

# Limited Broadcast 255.255.255.255 = subnetz-UNABHÄNGIG (Upstream-Default, recsync recceiver_full.conf):
# erreicht alle Mit-Container auf der channelfinder-net-Bridge, egal welches /16 Docker dynamisch vergibt.
# Robuster als ein gerichteter .255.255-Broadcast, der bei Subnet-Drift still ins Leere ginge (QA-HIGH;
# beide live auf der Bridge zugestellt gemessen). Der IOC-reccaster lauscht auf 0.0.0.0:5049 und verbindet
# sich per UDP-Quell-IP des Announce zurück (Auto-Discovery, subnetz-unabhängig).
addrlist = 255.255.255.255:5049

# Sende-Intervall der recceiver-Announces (Sekunden).
announceInterval = 15.0

# Processing chain: nur cf (= CFProcessor, registriert als "cf"). Liest die [cf]-Sektion.
procs = cf

[cf]
# alias/recordType/recordDesc als zusätzliche CF-Properties pro Kanal.
alias = True
recordType = True
recordDesc = True

# cleanOnStart markiert NUR die recceiver-EIGENEN Kanäle (gematcht über recceiverID) als Inactive —
# die admin-geseedeten M1-Kanäle (ohne recceiverID-Property) bleiben unberührt. Fester recceiverID
# = deterministisches Clean über Neustarts.
cleanOnStart = True
# recceiverId = exakt der Key, den cfstore CFConfig.loads liest (configparser ist case-insensitiv, aber
# wir matchen den Code-Key direkt statt uns auf Case-Folding zu verlassen). Im CF_INIT-Log gegenprüfbar.
recceiverId = recsync-sandbox

# Owner der angelegten Kanäle/Properties (= admin, konsistent mit dem M1-Seed). Die AUTH-Credentials
# stehen dagegen in channelfinderapi.conf — dieses username ist NUR das CF-Owner-Feld.
username = admin
